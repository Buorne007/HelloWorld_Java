<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Login System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">Login System</a>
            </div>
            <div class="navbar-menu">
                <span class="welcome-text" th:text="${'Welcome, ' + currentUser.fullName}"></span>
                <a href="/logout" class="btn btn-small btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-grid">
            <!-- User Profile Section -->
            <div class="card">
                <h2>User Profile</h2>
                <form id="profileForm">
                    <div class="profile-info">
                        <div class="info-row">
                            <span class="label">Username:</span>
                            <span class="value" th:text="${currentUser.username}"></span>
                        </div>
                        <div class="form-group">
                            <label for="fullName">Full Name:</label>
                            <input type="text" id="fullName" name="fullName" th:value="${currentUser.fullName}" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" th:value="${currentUser.email}" required>
                        </div>
                        <div class="info-row">
                            <span class="label">Status:</span>
                            <span class="value" th:if="${currentUser.active}">
                                <span class="badge badge-success">Active</span>
                            </span>
                            <span class="value" th:unless="${currentUser.active}">
                                <span class="badge badge-danger">Inactive</span>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-secondary btn-block">Update Profile</button>
                </form>

                <div id="profileMessage" class="message"></div>
            </div>

            <!-- Change Password Section -->
            <div class="card">
                <h2>Change Password</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="oldPassword">Current Password:</label>
                        <input type="password" id="oldPassword" name="oldPassword" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New Password (minimum 5 characters):</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="5">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Change Password</button>
                </form>

                <div id="passwordMessage" class="message"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Login System. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const profileMessageDiv = document.getElementById('profileMessage');

            fetch('/api/profile', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'fullName=' + encodeURIComponent(fullName) + '&email=' + encodeURIComponent(email)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    profileMessageDiv.className = 'message success';
                    profileMessageDiv.textContent = data.message;
                } else {
                    profileMessageDiv.className = 'message error';
                    profileMessageDiv.textContent = data.message;
                }
            })
            .catch(error => {
                profileMessageDiv.className = 'message error';
                profileMessageDiv.textContent = 'An error occurred. Please try again.';
                console.error('Error:', error);
            });
        });

        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('passwordMessage');

            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'New passwords do not match!';
                return;
            }

            fetch('/api/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'oldPassword=' + encodeURIComponent(oldPassword) + 
                      '&newPassword=' + encodeURIComponent(newPassword) + 
                      '&confirmPassword=' + encodeURIComponent(confirmPassword)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    document.getElementById('passwordForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message;
                }
            })
            .catch(error => {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
